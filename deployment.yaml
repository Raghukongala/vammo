apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking
  template:
    metadata:
      labels:
        app: banking
    spec:
      containers:
      - name: banking-container
        image: raghu282/banking-scheduler:v1
        ports:
        - containerPort: 5000
